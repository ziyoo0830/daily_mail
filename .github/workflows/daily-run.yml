name: Daily Python Script Execution

on:
  schedule:
    # 每天 UTC 时间 12:00 执行（北京时间 08:00）
    # Cron 表达式：分 时 日 月 星期
    - cron: '0 12 * * *'
  
  # 允许手动触发工作流
  workflow_dispatch:

jobs:
  run-scripts:
    runs-on: windows-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # 3. 安装依赖包
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install xcsc_tushare pandas openpyxl
          # 如果还有其他依赖，继续添加
          # pip install requests numpy etc.

      # 4. 配置 Tushare Token（从 Secrets 获取）
      - name: Configure environment
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: |
          echo "Environment configured"

      # 5. 运行脚本
      - name: Run Python scripts
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: |
          python cb.py
          python zhimingganggu_analyze_v3.py
          python zhishuv5.py
          python zhishuv6.py

      # 6. 上传生成的文件（如果有输出文件）
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-files-${{ github.run_number }}
          path: |
            *.xlsx
            *.csv
            *.txt
          retention-days: 7